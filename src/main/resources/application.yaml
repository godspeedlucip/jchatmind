spring:
  profiles:
    active: dev
  application:
    name: jchatmind
  datasource:
    url: jdbc:postgresql://localhost:5432/jchatmind
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email
    password: your-password # 邮箱授权码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: ${springAI.deepseek.api-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    zhipuai:
      api-key: ${springAI.zhipu.api-key}
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.6

vectormodel:
  api-key: ${springAI.qwen.api-key}
  base-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
  model: gte-rerank-v2
  dimensions: 1024

mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ./data/documents
